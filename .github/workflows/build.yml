name: Build HızlıYaz

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows-32:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11 x86
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x86"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow

      - name: Build exe
        run: |
          pyinstaller --onefile --windowed --name HizliYaz --icon icon.ico --add-data "icon.ico;." hizliyaz.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HizliYaz-win32
          path: dist/HizliYaz.exe

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HizliYaz.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
